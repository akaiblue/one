<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品集 - 视频展示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 960px;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 40px;
            text-align: center;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        video {
            width: 100%;
            display: block;
            border-radius: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin-top: 16px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .segment-info {
            text-align: center;
            margin-top: 12px;
            color: #666;
            font-size: 14px;
        }

        .info {
            margin-top: 32px;
            text-align: center;
        }

        .info h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info p {
            color: #666;
            font-size: 15px;
            line-height: 1.7;
            max-width: 600px;
            margin: 0 auto 20px;
        }

        .tags {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tag {
            padding: 6px 14px;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border-radius: 20px;
            font-size: 13px;
        }

        .footer {
            margin-top: 60px;
            color: #444;
            font-size: 13px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .info h1 { font-size: 22px; }
            .info p { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Portfolio</div>

        <div class="video-wrapper">
            <video controls id="mainVideo">
                <source src="video001.mp4" type="video/mp4">
                您的浏览器不支持视频播放，请使用 Chrome、Safari 或 Edge 浏览器。
            </video>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="segment-info" id="segmentInfo">第 1 / 3 段</div>

        <div class="info">
            <h1>作品标题</h1>
            <p>在这里写下你的作品描述，介绍创作背景、使用的工具、你在项目中承担的角色等信息。</p>
            <div class="tags">
                <span class="tag">Premiere Pro</span>
                <span class="tag">After Effects</span>
                <span class="tag">DaVinci Resolve</span>
            </div>
        </div>

        <div class="footer">
            联系方式: your-email@example.com
        </div>
    </div>

    <script>
        // 视频片段列表 - 根据实际片段数量修改
        const videoSegments = [
            'video001.mp4',
            'video002.mp4',
            'video003.mp4',
            'video004.mp4',
            'video005.mp4'
        ];

        const video = document.getElementById('mainVideo');
        const progressFill = document.getElementById('progressFill');
        const segmentInfo = document.getElementById('segmentInfo');
        let currentSegment = 0;

        function updateProgress() {
            const totalProgress = (currentSegment + video.currentTime / video.duration) / videoSegments.length * 100;
            progressFill.style.width = totalProgress + '%';
        }

        function loadSegment(index) {
            if (index >= videoSegments.length) {
                // 播放完毕
                segmentInfo.textContent = '播放完毕';
                return;
            }
            currentSegment = index;
            video.src = videoSegments[index];
            segmentInfo.textContent = `第 ${index + 1} / ${videoSegments.length} 段`;
            video.play();
        }

        video.addEventListener('ended', () => {
            loadSegment(currentSegment + 1);
        });

        video.addEventListener('timeupdate', updateProgress);

        // 初始化
        loadSegment(0);
    </script>
</body>
</html>
